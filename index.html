<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>長府スタンプラリー スキャナー</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fdfaf6; margin: 0; padding: 20px; }
        #wrapper { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; border: 4px solid #fff; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #msg { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: bold; background: #fff; border: 2px solid #ddd; color: #333; }
    </style>
</head>
<body>
    <div id="wrapper"><video id="video" autoplay playsinline muted></video></div>
    <div id="msg">カメラを起動中...</div>

    <script>
        // Supabase設定 (Project ID: vgwjykplfakpabdunoxi)
        const SUPABASE_URL = "https://vgwjykplfakpabdunoxi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_W-TPeQVE3YyPnHMiUVfHew_djQSBC9Y";
        
        const video = document.getElementById("video");
        const msg = document.getElementById("msg");
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        
        // GlideからURLパラメータ ?uid=ユーザーID を取得
        const myUserId = new URLSearchParams(window.location.search).get("uid") || "guest";
        let isScanning = true;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; video.play(); requestAnimationFrame(tick); msg.innerText = "QRコードをかざしてください"; })
            .catch(err => { msg.innerText = "カメラ権限が必要です"; });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
                if (code) { isScanning = false; sendData(code.data); }
            }
            if (isScanning) requestAnimationFrame(tick);
        }

        async function sendData(spotId) {
            msg.innerText = "照合中...";
            
            // 1. 重複チェック
            const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/stamps?user_id=eq.${encodeURIComponent(myUserId)}&spot_id=eq.${encodeURIComponent(spotId)}`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
            });
            const existing = await checkRes.json();

            if (existing && existing.length > 0) {
                msg.innerText = "⚠️ すでに取得済みです";
                setTimeout(() => { isScanning = true; }, 3000);
                return;
            }

            // 2. スタンプ登録
            const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/stamps`, {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY,
                    "Content-Type": "application/json", "Prefer": "return=minimal"
                },
                body: JSON.stringify({ user_id: myUserId, spot_id: spotId })
            });

            if (insertRes.ok) {
                msg.innerText = "✅ スタンプ獲得！";
                // Glide側へメッセージ送信
                window.parent.postMessage({ type: 'QR_SCANNED', spot_id: spotId }, '*');
            } else {
                msg.innerText = "登録失敗しました。再試行してください。";
                setTimeout(() => { isScanning = true; }, 3000);
            }
        }
    </script>
</body>
</html>
