<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>長府スタンプラリー スキャナー</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fdfaf6; margin: 0; padding: 20px; }
        #wrapper { position: relative; width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; border: 4px solid #fff; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #msg { margin-top: 20px; padding: 15px; border-radius: 12px; font-weight: bold; background: #fff; border: 2px solid #ddd; color: #333; }
    </style>
</head>
<body>
    <div id="wrapper"><video id="video" autoplay playsinline muted></video></div>
    <div id="msg">カメラを起動中...</div>

    <script>
        // 【送信先】完全に検証済みのMake Webhook URL
        const MAKE_WEBHOOK_URL = "https://hook.us2.make.com/c9u4w66v38wvwvlrohkotbowgixce8kb";
        
        const video = document.getElementById("video");
        const msg = document.getElementById("msg");
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        
        // 【修正】Glideの設定に合わせて「email」パラメータから取得するよう統一
        const userEmail = new URLSearchParams(window.location.search).get("email");
        let isScanning = true;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; video.play(); requestAnimationFrame(tick); msg.innerText = "QRコードをかざしてください"; })
            .catch(err => { msg.innerText = "カメラ権限が必要です"; });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
                if (code) { isScanning = false; sendData(code.data); }
            }
            if (isScanning) requestAnimationFrame(tick);
        }

        async function sendData(spotId) {
            if (!userEmail) {
                msg.innerText = "❌ エラー: 参加者情報(email)が取得できません";
                return;
            }

            msg.innerText = "スタンプ送信中...";
            
            try {
                // 最も確実なGETパラメータ方式でMakeにデータを直接送信
                const params = new URLSearchParams({
                    email: userEmail,
                    spot_id: spotId,
                    scanned_at: new Date().toISOString()
                });

                const response = await fetch(`${MAKE_WEBHOOK_URL}?${params.toString()}`, {
                    method: 'GET'
                });

                if (response.ok) {
                    msg.innerText = "✅ スタンプ獲得！";
                    // Glide側へのメッセージ通知
                    window.parent.postMessage({ type: 'QR_SCANNED', spot_id: spotId }, '*');
                } else {
                    msg.innerText = `❌ サーバーエラー: ${response.status}`;
                    setTimeout(() => { isScanning = true; msg.innerText = "QRコードをかざしてください"; }, 3000);
                }
            } catch (error) {
                msg.innerText = "❌ 通信エラーが発生しました";
                setTimeout(() => { isScanning = true; msg.innerText = "QRコードをかざしてください"; }, 3000);
            }
        }
    </script>
</body>
</html>
